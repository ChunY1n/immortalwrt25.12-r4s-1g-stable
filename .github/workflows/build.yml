name: Auto Build and Release ImmortalWrt Stable for R4S 1G

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "强制编译（忽略更新检查，即使源码没有新提交也编译）"
        required: false
        default: "false"
        type: boolean
  schedule:
    # UTC 每天 18:00 检查一次（北京时间次日凌晨 2:00）；没有新提交时会自动跳过编译，不浪费 Actions 分钟数
    - cron: '0 18 * * *'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  # 锁定当前最新稳定分支（25.12），而非 master 开发分支，保证编译出的是稳定版
  # 升级到更新的稳定版时，只需把这里换成新分支名，例如未来的 openwrt-26.xx
  REPO_BRANCH: openwrt-25.12
  TZ: Asia/Shanghai

jobs:
  # ───────────────────────────────────────────────
  # 第一阶段：检查上游是否有新提交，没有就直接跳过编译，节省 Actions 用量
  # ───────────────────────────────────────────────
  check-update:
    runs-on: ubuntu-22.04
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      remote_commit: ${{ steps.check.outputs.remote_commit }}
    steps:
      - name: Check upstream for new commits
        id: check
        run: |
          REMOTE_COMMIT=$(git ls-remote ${{ env.REPO_URL }} refs/heads/${{ env.REPO_BRANCH }} | cut -f1)
          echo "remote_commit=$REMOTE_COMMIT" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event.inputs.force_build }}" = "true" ]; then
            echo "手动强制编译，跳过更新检查"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 用 GitHub API 查最新 release 的 tag 里记录的上游 commit，没有 release 记录就直接编译
          LATEST_TAG=$(curl -fsSL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            | grep -o '"tag_name": *"[^"]*"' | sed 's/.*"\([^"]*\)"$/\1/' || true)

          if [ -z "$LATEST_TAG" ]; then
            echo "未找到历史 Release，首次编译"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if echo "$LATEST_TAG" | grep -q "$REMOTE_COMMIT"; then
            echo "上游无新提交（commit: $REMOTE_COMMIT），跳过本次编译"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "检测到上游新提交：$REMOTE_COMMIT，开始编译"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  # ───────────────────────────────────────────────
  # 第二阶段：实际编译固件（仅当检测到更新或手动强制触发时运行）
  # ───────────────────────────────────────────────
  build:
    needs: check-update
    if: needs.check-update.outputs.should_build == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write

    steps:
      - name: Free up disk space
        run: |
          echo "清理前磁盘占用："
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost /usr/local/graalvm* /usr/local/.ghcup
          sudo rm -rf /usr/lib/jvm /usr/share/swift /usr/local/julia*
          sudo docker image prune --all --force 2>/dev/null || true
          sudo apt-get clean
          echo "清理后磁盘占用："
          df -h /

      - name: Increase swap space
        run: |
          # dockerman/passwall/homeproxy 等插件编译期内存占用较高，加 swap 防 OOM
          AVAIL_GB=$(df --output=avail -BG / | tail -1 | tr -dc '0-9')
          SWAP_GB=$(( AVAIL_GB / 4 > 8 ? 8 : AVAIL_GB / 4 ))
          [ "$SWAP_GB" -lt 1 ] && SWAP_GB=1
          echo "分配 ${SWAP_GB}G swap"
          sudo swapoff -a
          sudo fallocate -l ${SWAP_GB}G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize compilation environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 仅清理大文件，不再盲目执行 rm -rf /etc/apt/sources.list.d/* 以免丢失官方软件源
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-distutils python3-pip python3-pyelftools python3-setuptools \
            swig rsync unzip zlib1g-dev file wget curl
          
          # 确保通过 pip 再次兜底安装 pyelftools 以防 u-boot 检查失败
          sudo -E pip3 install --upgrade pyelftools
          python3 -c "import elftools; print('pyelftools OK:', elftools.__file__)"
          sudo timedatectl set-timezone "$TZ"

      - name: Setup Node 14 for homebox frontend build
        # homebox 前端用的是 2020 年的 Parcel v1，新版 Node 自带的 OpenSSL3
        # 会让它直接崩溃，必须切到 Node 14 才能正常 npm run build
        uses: actions/setup-node@v4
        with:
          node-version: "14"

      - name: Setup Go Environment
        # 解决 homebox 后端构建时 `go: command not found` 的错误
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Clone ImmortalWrt source code
        run: git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

      - name: Record source commit
        working-directory: ./openwrt
        run: |
          echo "SOURCE_COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "SOURCE_COMMIT_FULL=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Get week number
        id: weeknum
        run: echo "week=$(date +%Y-%U)" >> $GITHUB_OUTPUT

      - name: Cache downloaded packages (dl)
        # GitHub 单仓库缓存总上限 10GB，超出会自动淘汰最旧缓存，属已知限制
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: dl-packages-${{ env.REPO_BRANCH }}-${{ steps.weeknum.outputs.week }}
          restore-keys: |
            dl-packages-${{ env.REPO_BRANCH }}-

      - name: Add homebox feed
        working-directory: ./openwrt
        run: |
          # luci-app-homebox / homebox 来自 jjm2473 维护的 feed，官方/ImmortalWrt
          # 自带 feed 里都没有这个包，需要手动加进 feeds.conf.default
          echo "src-git jjm2473 https://github.com/jjm2473/openwrt-apps.git" >> feeds.conf.default
          cat feeds.conf.default

      - name: Update and install feeds
        working-directory: ./openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate custom configuration
        working-directory: ./openwrt
        run: |
          rm -f .config

          # ── 1. 基础目标：Rockchip RK3328 (NanoPi R4S) ──
          cat >> .config <<-EOF
          CONFIG_TARGET_rockchip=y
          CONFIG_TARGET_rockchip_armv8=y
          CONFIG_TARGET_rockchip_armv8_DEVICE_friendlyarm_nanopi-r4s=y
          EOF

          # ── 2. 分区大小：1G 设备的合理分配 ──
          # kernel 分区 32M 足够；rootfs 给到 1536M（约 1.5GB ext4 可用空间）
          cat >> .config <<-EOF
          CONFIG_TARGET_KERNEL_PARTSIZE=32
          CONFIG_TARGET_ROOTFS_PARTSIZE=1536
          EOF

          # ── 3. 预装指定插件 ──
          cat >> .config <<-EOF
          CONFIG_PACKAGE_luci-app-dockerman=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-app-homeproxy=y
          CONFIG_PACKAGE_luci-app-upnp=y
          CONFIG_PACKAGE_homebox=y
          CONFIG_PACKAGE_luci-app-homebox=y
          EOF

          # ── 3.0 基础/系统预装包 ──
          cat >> .config <<-EOF
          CONFIG_PACKAGE_apk-openssl=y
          CONFIG_PACKAGE_autocore=y
          CONFIG_PACKAGE_automount=y
          CONFIG_PACKAGE_base-files=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_default-settings-chn=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_dropbear=y
          CONFIG_PACKAGE_fdisk=y
          CONFIG_PACKAGE_firewall4=y
          CONFIG_PACKAGE_fstools=y
          CONFIG_PACKAGE_kmod-gpio-button-hotplug=y
          CONFIG_PACKAGE_kmod-nf-nathelper=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          CONFIG_PACKAGE_libc=y
          CONFIG_PACKAGE_libgcc=y
          CONFIG_PACKAGE_libustream-openssl=y
          CONFIG_PACKAGE_logd=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-app-cpufreq=y
          CONFIG_PACKAGE_mkf2fs=y
          CONFIG_PACKAGE_mtd=y
          CONFIG_PACKAGE_netifd=y
          CONFIG_PACKAGE_nftables=y
          CONFIG_PACKAGE_odhcp6c=y
          CONFIG_PACKAGE_odhcpd-ipv6only=y
          CONFIG_PACKAGE_partx-utils=y
          CONFIG_PACKAGE_ppp=y
          CONFIG_PACKAGE_ppp-mod-pppoe=y
          CONFIG_PACKAGE_procd-ujail=y
          CONFIG_PACKAGE_uboot-envtools=y
          CONFIG_PACKAGE_uci=y
          CONFIG_PACKAGE_uclient-fetch=y
          CONFIG_PACKAGE_urandom-seed=y
          CONFIG_PACKAGE_urngd=y
          CONFIG_PACKAGE_kmod-r8169=y
          CONFIG_PACKAGE_kmod-usb-net-rtl8152=y
          EOF

          # ── 3.1 磁盘管理 diskman ──
          cat >> .config <<-EOF
          CONFIG_PACKAGE_luci-app-diskman=y
          CONFIG_PACKAGE_luci-i18n-diskman-zh-cn=y
          CONFIG_PACKAGE_kmod-fs-msdos=y
          CONFIG_PACKAGE_kmod-nls-cp932=y
          CONFIG_PACKAGE_kmod-nls-cp936=y
          CONFIG_PACKAGE_kmod-nls-cp950=y
          EOF

          # ── 3.2 系统监控 netdata ──
          cat >> .config <<-EOF
          CONFIG_PACKAGE_luci-app-netdata=y
          CONFIG_PACKAGE_netdata=y
          CONFIG_PACKAGE_luci-i18n-netdata-zh-cn=y
          EOF

          # ── 3.3 NAS共享 samba4 ──
          cat >> .config <<-EOF
          CONFIG_PACKAGE_luci-app-samba4=y
          CONFIG_PACKAGE_luci-i18n-samba4-zh-cn=y
          EOF

          # ── 3.4 homebox 编译关键开关 ──
          cat >> .config <<-EOF
          # CONFIG_AUTOREMOVE is not set
          EOF

          # ── 4. 网络性能与转发效率优化 ──
          cat >> .config <<-EOF
          CONFIG_PACKAGE_kmod-nf-nathelper=y
          CONFIG_PACKAGE_kmod-nf-nathelper-extra=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_kmod-tcp-bbr=y
          CONFIG_PACKAGE_ethtool=y
          CONFIG_PACKAGE_irqbalance=y
          EOF

          # ── 5. 实用工具与中文包 ──
          cat >> .config <<-EOF
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-watchdog=y
          CONFIG_PACKAGE_openssh-sftp-server=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-dockerman-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-homeproxy-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-package-manager-zh-cn=y
          EOF

          make defconfig

      - name: 核对本次新增插件是否选中成功
        working-directory: ./openwrt
        run: |
          echo "---- diskman 相关 ----"
          grep -E "luci-app-diskman|luci-i18n-diskman|kmod-fs-msdos|kmod-nls-cp9" .config || echo "(未匹配到)"
          echo "---- netdata 相关 ----"
          grep -E "luci-app-netdata|CONFIG_PACKAGE_netdata=y|luci-i18n-netdata" .config || echo "(未匹配到)"
          echo "---- samba4 相关 ----"
          grep -E "luci-app-samba4|luci-i18n-samba4" .config || echo "(未匹配到)"
          echo "---- homebox 相关 ----"
          grep -E "CONFIG_PACKAGE_homebox=y|CONFIG_PACKAGE_luci-app-homebox=y|CONFIG_AUTOREMOVE" .config || echo "(未匹配到)"
          echo "---- 两个网口驱动 (r8169 + rtl8152) ----"
          grep -E "CONFIG_PACKAGE_kmod-r8169=y|CONFIG_PACKAGE_kmod-usb-net-rtl8152=y" .config || echo "(未匹配到)"

      - name: Download packages
        working-directory: ./openwrt
        run: |
          for i in 1 2 3; do
            make download -j8 && break
            echo "第 $i 次下载未完全成功，清理可疑文件后重试..."
            find dl -size -1024c -exec rm -f {} \;
            sleep 10
          done
          make download -j1
          find dl -size -1024c | grep -q . && echo "::warning::仍有部分包体积异常，请检查日志" || echo "所有包下载完整"

      - name: Compile the firmware
        id: compile
        working-directory: ./openwrt
        run: |
          make -j$(nproc) || make -j1 || make -j1 V=s

      - name: Verify homebox frontend build
        working-directory: ./openwrt
        run: |
          STATIC_DIR=$(find build_dir/hostpkg -maxdepth 4 -type d -path "*homebox*/build/static" | head -n1)
          if [ -z "$STATIC_DIR" ]; then
            echo "::warning::没找到 homebox 前端 build/static"
          else
            echo "OK: $STATIC_DIR"
            ls "$STATIC_DIR"
          fi

      - name: Upload build logs (only on failure)
        if: failure() && steps.compile.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_id }}
          path: |
            openwrt/logs/
            openwrt/.config
          retention-days: 5

      - name: Check rootfs usage (warn if near full)
        working-directory: ./openwrt
        run: |
          cd bin/targets/*/*
          IMG=$(ls *-squashfs-sysupgrade.img.gz 2>/dev/null | head -1 || true)
          if [ -n "$IMG" ]; then
            SIZE_MB=$(du -m "$IMG" | cut -f1)
            echo "固件大小：${SIZE_MB}M"
          fi

      - name: Organize output files and generate Tag
        id: organize
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "RELEASE_TAG=$(date +"%Y.%m.%d-%H%M")-${SOURCE_COMMIT}" >> $GITHUB_ENV
          echo "RELEASE_DATE=$(date +"%Y年%m月%d日 %H:%M")" >> $GITHUB_ENV

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: 🚀 ImmortalWrt R4S (1G) 稳定版自动构建 - ${{ env.RELEASE_DATE }}
          body: |
            ## 🔄 自动检测更新并编译
            - **设备**: NanoPi R4S (1G 内存版本)
            - **源码分支**: [ImmortalWrt ${{ env.REPO_BRANCH }}](${{ env.REPO_URL }}/tree/${{ env.REPO_BRANCH }})
            - **构建 Commit**: [`${{ env.SOURCE_COMMIT }}`](${{ env.REPO_URL }}/commit/${{ env.SOURCE_COMMIT_FULL }})
            - **RootFS 空间**: 1536 MB

            ## 📦 已集成插件
            - 🐳 `luci-app-dockerman`
            - 🛡️ `luci-app-passwall`
            - 🚀 `luci-app-homeproxy`
            - 🔌 `luci-app-upnp`
            - 💾 `luci-app-diskman`
            - 📊 `luci-app-netdata`
            - 🗂️ `luci-app-samba4`
            - 🏠 `luci-app-homebox`
            - 🖥️ `luci-app-ttyd`

            💡 **刷写说明**: 全新刷写下载 `squashfs-sysupgrade.img.gz`。
          files: |
            ${{ env.FIRMWARE }}/*.img.gz
            ${{ env.FIRMWARE }}/*sha256sums*
            ${{ env.FIRMWARE }}/*.manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete older releases
        uses: dev-drprasad/delete-older-releases@v0.3.3
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete older workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 14
          keep_minimum_runs: 5
